services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bancobd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/BaseDatos.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bancobd"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── cliente-service (8081) ────────────────────────────────────────────────
  cliente-service:
    build:
      context: .
      dockerfile: cliente-service/Dockerfile
    container_name: cliente-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bancobd
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s


  # ── cuenta-service (8082) ─────────────────────────────────────────────────
  cuenta-service:
    build:
      context: .
      dockerfile: cuenta-service/Dockerfile
    container_name: cuenta-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bancobd
      DB_USER: postgres
      DB_PASSWORD: postgres
      CLIENTE_SERVICE_HOST: cliente-service
      CLIENTE_SERVICE_PORT: 8081
    depends_on:
      cliente-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s


  # ── movimiento-service (8083) ─────────────────────────────────────────────
  movimiento-service:
    build:
      context: .
      dockerfile: movimiento-service/Dockerfile
    container_name: movimiento-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bancobd
      DB_USER: postgres
      DB_PASSWORD: postgres
      CUENTA_SERVICE_HOST: cuenta-service
      CUENTA_SERVICE_PORT: 8082
      CLIENTE_SERVICE_HOST: cliente-service
      CLIENTE_SERVICE_PORT: 8081
    depends_on:
      cuenta-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s


  # ── api-gateway (8080) ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CLIENTE_SERVICE_HOST: cliente-service
      CLIENTE_SERVICE_PORT: 8081
      CUENTA_SERVICE_HOST: cuenta-service
      CUENTA_SERVICE_PORT: 8082
      MOVIMIENTO_SERVICE_HOST: movimiento-service
      MOVIMIENTO_SERVICE_PORT: 8083
    depends_on:
      movimiento-service:
        condition: service_healthy


volumes:
  postgres_data: